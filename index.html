<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ポコチャメーター リアルタイム縦入力版</title>
<style>
:root{--main:#ff6048;--blue:#2f80ed;--bg:#f5f5f5;--card:#fff;--text:#222;--muted:#666;--line:#e8e8e8}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding-bottom:96px}
header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);padding:16px 18px}
h1{font-size:24px;margin:0;font-weight:700}.subtitle{font-size:14px;color:var(--muted);margin-top:4px;line-height:1.4}
main{max-width:540px;margin:auto;padding:14px}.card{background:var(--card);border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 2px 10px rgba(0,0,0,.04)}
h2{font-size:22px;margin:0 0 14px;font-weight:600}h3{font-size:18px;margin:18px 0 8px;font-weight:600}
label{display:block;font-size:15px;font-weight:600;margin:12px 0 6px}
input,select{width:100%;height:54px;border:1px solid #ddd;border-radius:16px;padding:0 14px;font-size:22px;background:white;font-weight:500}
input::placeholder{color:#777;font-weight:600}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
button{width:100%;border:0;border-radius:16px;padding:16px;margin-top:12px;background:var(--main);color:white;font-size:18px;font-weight:600}
button.dark{background:#333}button.blue{background:var(--blue)}button.light{background:#eee;color:#333}
.result{background:#fafafa;border:1px solid #eee;border-radius:16px;padding:14px;line-height:1.7;font-size:15px;margin-top:14px}
.big-status{font-size:24px;font-weight:600;color:var(--main);line-height:1.5}.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.box{background:#fafafa;border:1px solid #eee;border-radius:16px;padding:12px}.box .label{font-size:12px;color:var(--muted);font-weight:500}.box .value{font-size:22px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:15px}th,td{border-bottom:1px solid #eee;padding:10px 4px;text-align:right}th:first-child,td:first-child{text-align:left}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;background:white;border-top:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));z-index:20}
.bottom-nav button{margin:0;background:var(--main);border-radius:14px;font-size:16px;padding:13px 4px}.section{display:none}.section.active{display:block}
.item-row{display:flex;align-items:center;gap:8px;border-bottom:1px solid #eee;padding:10px 0}.item-row span{flex:1}.item-row button{width:auto;margin:0;padding:8px 12px;font-size:13px;background:#999}
.notice{background:#fff7f3;border:1px solid #ffd6c8;border-radius:16px;padding:12px;line-height:1.6;color:#555;margin-top:12px}
.input-stack{display:grid;grid-template-columns:1fr;gap:12px;margin-top:8px}
.input-card{background:#fafafa;border:1px solid #eee;border-radius:18px;padding:12px}
.input-card label{margin:0 0 7px;font-size:16px}
.input-card input{font-size:24px;height:58px;letter-spacing:.3px}
.input-card.zero{border-color:#ffd0a8;background:#fff8f2}
.input-card.plus1{border-color:#b9d8ff;background:#f5f9ff}
.input-card.plus2{border-color:#d6c4ff;background:#faf7ff}
.input-card.zero label{color:#d86b00}
.input-card.plus1 label{color:#2f80ed}
.input-card.plus2 label{color:#6b4aff}
.live-share-card{background:#f7fbff;border:1px solid #cfe7ff;border-radius:18px;padding:14px;margin:14px 0}
.live-share-card h3{font-size:18px;margin:0 0 8px;font-weight:600}
.live-meter-box{background:#fff;border:1px solid #eee;border-radius:16px;padding:14px;margin-top:10px}
.live-meter-box .rank{font-size:14px;color:var(--muted);font-weight:600}
.live-meter-box .main{font-size:23px;font-weight:600;color:var(--main);line-height:1.6}
.live-meter-box .sub{font-size:13px;color:var(--muted);line-height:1.6}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mode-row button{margin-top:0}

.live-values{display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px}
.live-value{border-radius:14px;padding:10px 12px;font-weight:700;font-size:20px;display:flex;justify-content:space-between;align-items:center}
.live-value.zero{background:#fff8f2;border:1px solid #ffd0a8;color:#d86b00}
.live-value.plus1{background:#f5f9ff;border:1px solid #b9d8ff;color:#2f80ed}
.live-value.plus2{background:#faf7ff;border:1px solid #d6c4ff;color:#6b4aff}
.live-value span:first-child{font-size:16px}
.live-value span:last-child{font-size:24px;color:#222}
.live-meta{font-size:13px;color:var(--muted);line-height:1.7;margin-top:8px}

.history-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.history-scroll table{min-width:560px}
.shared-note{font-size:13px;color:var(--muted);line-height:1.6;margin-top:8px}
.delete-mini{width:auto;margin:0;padding:8px 10px;font-size:12px;background:#999;border-radius:12px}
</style>
</head>
<body>
<header><h1>ポコチャメーター リアルタイム縦入力版</h1><div class="subtitle">リアルタイム共有・縦入力・履歴・平均・コアボーナス</div></header>
<main>
<section id="sec-calc" class="section active">
<div class="card"><h2>⚡ クイック入力</h2>
<div class="input-stack">
<div class="input-card"><label>現在pt</label><input id="point" type="number" inputmode="numeric" placeholder="例：4200000"></div>
<div class="input-card"><label>エールボーナス加算pt</label><input id="yellBonusPoint" type="number" inputmode="numeric" value="0"></div>
<div class="input-card zero"><label>🟧 ±0</label><input id="zero" type="number" inputmode="numeric" value="300000"></div>
<div class="input-card plus1"><label>🟦 +1</label><input id="plus1" type="number" inputmode="numeric" value="600000"></div>
<div class="input-card plus2"><label>🟪 +2</label><input id="plus2" type="number" inputmode="numeric" value="1000000"></div>
</div>
<button onclick="calc()">計算する</button><button class="dark" onclick="copySummary()">結果をコピー</button>
<div id="dashboard" class="result">まだ計算していません。</div></div>
</section>

<section id="sec-history" class="section">
<div class="card"><h2>🧮 前日ボーダー履歴</h2>
<label>日付</label><input id="borderDate" type="date">
<div class="live-share-card">
<h3>📡 ファミリーリアルタイム共有</h3>
<small>入力係が「保存してみんなに反映」を押すと、見る側の画面も自動で更新されます。</small>
<label>更新者名</label><input id="updaterName" placeholder="例：りょう">
<div class="mode-row">
<button class="blue" onclick="saveAndShareLive()">保存してみんなに反映</button>
<button class="dark" onclick="startLiveMeterSync()">見るだけON</button>
</div>
<button class="light" onclick="stopLiveMeterSync()">見るだけOFF</button>
<div id="liveMeterBox" class="live-meter-box">
<div class="rank">共有メーター</div><div class="main">まだ受信していません</div><div class="sub">見るだけONを押すと、共有メーターと共有履歴が自動更新されます。</div>
</div>
</div>
<div class="input-stack">
<div class="input-card zero"><label>🟧 ±0</label><input id="histZero" type="number" inputmode="numeric"></div>
<div class="input-card plus1"><label>🟦 +1</label><input id="histPlus1" type="number" inputmode="numeric"></div>
<div class="input-card plus2"><label>🟪 +2</label><input id="histPlus2" type="number" inputmode="numeric"></div>
</div>
<label>自分の最終pt 任意</label><input id="myFinalPoint" type="number" inputmode="numeric">
<button onclick="saveBorderHistory()">保存</button><button class="blue" onclick="saveAndShare()">保存して全国共有にも投稿</button><button class="blue" onclick="predictBorders()">直近平均を計算</button><button class="dark" onclick="applyPredictedBorders()">平均ボーダーを反映</button><button class="light" onclick="downloadBorderCSV()">CSV出力</button>
<div class="notice">Firebase設定済みなら、共有データは <strong>family_meter</strong> と <strong>shared_borders</strong> に保存されます。</div>
<div id="borderAnalysis" class="result"></div><div id="borderHistoryArea"></div></div>
</section>

<section id="sec-settings" class="section">
<div class="card"><h2>⚙️ ランク・コア設定</h2>
<label>ランク帯</label><select id="rank" onchange="applyRankPreset()"><option>S1</option><option>S2</option><option>S3</option><option>S4</option><option>S5</option><option>S6</option></select>
<button class="dark" onclick="saveRankPreset()">現在のボーダーをこのランクに保存</button>
<label>1コインあたりの基礎pt</label><input id="base" type="number" value="4" step="0.1">
<label>コアファン人数</label><input id="coreCount" type="number" inputmode="numeric" value="0">
<button class="blue" onclick="showCoreBonus()">コアボーナス確認</button><div id="coreBonusResult" class="result"></div>
<h3>コアボーナス表</h3><div id="coreTableArea"></div></div>
<div class="card"><h2>🎁 アイテム一覧</h2><label>メイン表示アイテム</label><select id="selectedItem"></select>
<div class="grid2"><div><label>アイテム名</label><input id="newItemName" placeholder=""></div><div><label>コイン数</label><input id="newItemCoin" type="number" inputmode="numeric"></div></div>
<button class="dark" onclick="addItem()">アイテム追加</button><button class="light" onclick="resetItems()">初期アイテムに戻す</button><div id="itemList"></div></div>
</section>
</main>
<div class="bottom-nav"><button onclick="showSection('calc')">計算</button><button onclick="showSection('history')">履歴</button><button onclick="showSection('settings')">設定</button></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyA2EXZvEI_xeFBNuz40HoN32l6RxGdE518",authDomain:"pocochameter.firebaseapp.com",projectId:"pocochameter",storageBucket:"pocochameter.firebasestorage.app",messagingSenderId:"698530879419",appId:"1:698530879419:web:601abd54ddd0303510969e",measurementId:"G-6QBYFB8Y2B"};
const defaultItems=[{name:"花火",coin:1080},{name:"馬車",coin:5555},{name:"小馬車",coin:3333},{name:"ロケット",coin:10000}];
const defaultRankPresets={S1:{zero:300000,plus1:600000,plus2:1000000},S2:{zero:400000,plus1:800000,plus2:1300000},S3:{zero:500000,plus1:1000000,plus2:1600000},S4:{zero:650000,plus1:1300000,plus2:2100000},S5:{zero:800000,plus1:1600000,plus2:2600000},S6:{zero:1000000,plus1:2000000,plus2:3200000}};
const coreRules=[{min:0,rate:1},{min:2,rate:1.01},{min:5,rate:1.02},{min:10,rate:1.03},{min:15,rate:1.04},{min:20,rate:1.05},{min:25,rate:1.06},{min:30,rate:1.07},{min:35,rate:1.08},{min:40,rate:1.09},{min:45,rate:1.10},{min:50,rate:1.11},{min:60,rate:1.12},{min:70,rate:1.13},{min:80,rate:1.14},{min:90,rate:1.15},{min:100,rate:1.16},{min:150,rate:1.17},{min:200,rate:1.18},{min:250,rate:1.19},{min:300,rate:1.20},{min:400,rate:1.21},{min:500,rate:1.22}];
let predicted=null, db=null, liveUnsubscribe=null, historyUnsubscribe=null;

function showSection(n){document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));document.getElementById("sec-"+n).classList.add("active")}
function num(id){return Number(document.getElementById(id)?.value||0)}
function yen(v){return Math.round(v||0).toLocaleString()}
function todayISO(){return new Date().toISOString().slice(0,10)}
function initFirebase(){if(db)return true;if(!window.firebase)return false;try{if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);db=firebase.firestore();return true}catch(e){console.error(e);return false}}

function loadPresets(){return JSON.parse(localStorage.getItem("rankPresets")||JSON.stringify(defaultRankPresets))}
function savePresets(p){localStorage.setItem("rankPresets",JSON.stringify(p))}
function applyRankPreset(){let p=loadPresets()[rank.value];if(!p)return;zero.value=p.zero;plus1.value=p.plus1;plus2.value=p.plus2}
function saveRankPreset(){let p=loadPresets();p[rank.value]={zero:num("zero"),plus1:num("plus1"),plus2:num("plus2")};savePresets(p);alert(rank.value+"に保存しました")}
function autoCoreBonus(c){let r=1;coreRules.forEach(x=>{if(c>=x.min)r=x.rate});return r}
function renderCoreRules(){let h="<table><tr><th>人数</th><th>倍率</th><th>表記</th></tr>";coreRules.forEach(r=>h+=`<tr><td>${r.min}人以上</td><td>${Math.round(r.rate*100)}%</td><td>${Math.round((r.rate-1)*100)}%UP</td></tr>`);coreTableArea.innerHTML=h+"</table>"}
function showCoreBonus(){let c=num("coreCount"),b=num("base"),r=autoCoreBonus(c);coreBonusResult.innerHTML=`コア人数：<strong>${c}人</strong><br>ボーナス：<strong>${Math.round(r*100)}%</strong>（${Math.round((r-1)*100)}%UP）<br>1コイン換算：約 <strong>${(b*r).toFixed(2)}pt</strong>`}

function loadItems(){return JSON.parse(localStorage.getItem("items")||JSON.stringify(defaultItems))}
function saveItems(i){localStorage.setItem("items",JSON.stringify(i))}
function renderItems(){let items=loadItems();selectedItem.innerHTML="";items.forEach((it,i)=>{let op=document.createElement("option");op.value=i;op.textContent=`${it.name}（${yen(it.coin)}コイン）`;selectedItem.appendChild(op)});itemList.innerHTML=items.map((it,i)=>`<div class="item-row"><span>${it.name}：${yen(it.coin)}コイン</span><button onclick="deleteItem(${i})">削除</button></div>`).join("")}
function addItem(){let n=newItemName.value.trim(),c=num("newItemCoin");if(!n||c<=0){alert("アイテム名とコイン数を入力してください");return}let items=loadItems();items.push({name:n,coin:c});saveItems(items);newItemName.value="";newItemCoin.value="";renderItems()}
function deleteItem(i){let items=loadItems();items.splice(i,1);saveItems(items.length?items:defaultItems);renderItems()}
function resetItems(){saveItems(defaultItems);renderItems()}

function needCoin(pt,rate){return rate<=0?0:Math.ceil(pt/rate)}
function itemCount(c,coin){return c<=0?0:Math.ceil(c/coin)}
function meter(p,z,p1,p2){if(p>=p2)return"+2";if(p>=p1)return"+1";if(p>=z)return"±0";return"±0未満"}
function combo(coins){let items=loadItems(),b=items.find(i=>i.name.includes("馬車"))||items[0],h=items.find(i=>i.name.includes("花火"))||items[0];if(coins<=0)return"到達済み";let best=null;for(let bi=0;bi<=Math.ceil(coins/b.coin)+2;bi++){for(let hi=0;hi<=Math.ceil(coins/h.coin)+5;hi++){let total=bi*b.coin+hi*h.coin;if(total>=coins){let cand={bi,hi,over:total-coins,count:bi+hi};if(!best||cand.over<best.over||(cand.over===best.over&&cand.count<best.count))best=cand}}}return `${b.name}${best.bi}個 + ${h.name}${best.hi}個`}
function calc(){let raw=num("point"),p=raw+num("yellBonusPoint"),z=num("zero"),p1=num("plus1"),p2=num("plus2"),rate=num("base")*autoCoreBonus(num("coreCount")),items=loadItems(),sel=items[Number(selectedItem.value)]||items[0];let h=`<div class="big-status">現在：${meter(p,z,p1,p2)}</div><div class="kpi"><div class="box"><div class="label">計算pt</div><div class="value">${yen(p)}</div></div><div class="box"><div class="label">1コイン</div><div class="value">${rate.toFixed(2)}pt</div></div></div>`;[{name:"±0",v:z},{name:"+1",v:p1},{name:"+2",v:p2}].forEach(t=>{let need=Math.max(0,t.v-p),coins=needCoin(need,rate);h+=`<hr style="border:0;border-top:1px solid #eee;margin:14px 0"><strong>${t.name}まで</strong><br>あと ${yen(need)}pt<br>必要コイン：約 ${yen(coins)}<br>${sel.name}：約 ${yen(itemCount(coins,sel.coin))}個<br>組み合わせ：${combo(coins)}`});dashboard.innerHTML=h;saveInputs()}
function copySummary(){navigator.clipboard.writeText(dashboard.innerText).then(()=>alert("コピーしました"))}

function historyKey(x){return `${x.date}_${x.rank||rank.value}`}
function normalizeHistoryList(list){
  const map={};
  list.forEach(x=>{
    if(!x||!x.date)return;
    map[historyKey(x)]={...map[historyKey(x)],...x};
  });
  return Object.values(map).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
}
function loadBorderHistory(){return JSON.parse(localStorage.getItem("borderHistory")||"[]")}
function saveBorderHistoryList(l){localStorage.setItem("borderHistory",JSON.stringify(normalizeHistoryList(l)))}
function saveBorderHistory(){let row={date:borderDate.value||todayISO(),rank:rank.value,zero:num("histZero"),plus1:num("histPlus1"),plus2:num("histPlus2"),myPoint:num("myFinalPoint")};if(row.zero<=0||row.plus1<=0||row.plus2<=0){alert("±0/+1/+2を入力してください");return false}let list=loadBorderHistory().filter(x=>historyKey(x)!==historyKey(row));list.push(row);saveBorderHistoryList(list);renderBorderHistory();return true}
async function saveAndShare(){if(!saveBorderHistory())return;if(!initFirebase()){alert("端末保存しました。Firebaseは未接続です。");return}let row={date:borderDate.value||todayISO(),rank:rank.value,zero:num("histZero"),plus1:num("histPlus1"),plus2:num("histPlus2"),updater:updaterName.value.trim()||"未入力",createdAt:new Date().toISOString()};try{await db.collection("family_meter").doc(`${row.date}_${row.rank}`).set(row);await db.collection("shared_borders").doc(`${row.date}_${row.rank}`).set(row);alert("全国共有にも投稿しました")}catch(e){console.error(e);alert("共有に失敗しました。Firebaseルールを確認してください")}}

async function saveAndShareLive(){
  if(!initFirebase()){alert("Firebaseに接続できません");return}
  const row={date:borderDate.value||todayISO(),rank:rank.value,zero:num("histZero"),plus1:num("histPlus1"),plus2:num("histPlus2"),updater:updaterName.value.trim()||"未入力",updatedAt:new Date().toISOString(),createdAt:new Date().toISOString()};
  if(row.zero<=0||row.plus1<=0||row.plus2<=0){alert("±0 / +1 / +2 を入力してください");return}
  try{
    await db.collection("family_meter").doc("live").set(row);
    await db.collection("family_meter").doc(`${row.date}_${row.rank}`).set(row);
    await db.collection("shared_borders").doc(`${row.date}_${row.rank}`).set(row);

    let list=loadBorderHistory().filter(x=>historyKey(x)!==historyKey(row));
    list.push(row);
    saveBorderHistoryList(list);
    renderBorderHistory();

    liveMeterBox.innerHTML=`<div class="rank">共有メーター ${row.rank}</div><div class="main">送信しました</div><div class="live-values"><div class="live-value zero"><span>🟧 ±0</span><span>${yen(row.zero)}</span></div><div class="live-value plus1"><span>🟦 +1</span><span>${yen(row.plus1)}</span></div><div class="live-value plus2"><span>🟪 +2</span><span>${yen(row.plus2)}</span></div></div><div class="live-meta">更新者：${row.updater}<br>日付：${row.date}</div>`;
    saveInputs();
    alert("みんなに反映しました");
  }catch(e){console.error(e);alert("送信に失敗しました。Firebaseルールを確認してください")}
}

function startLiveMeterSync(){
  if(!initFirebase()){alert("Firebaseに接続できません");return}
  if(liveUnsubscribe)liveUnsubscribe();
  if(historyUnsubscribe)historyUnsubscribe();

  liveMeterBox.innerHTML=`<div class="rank">共有メーター</div><div class="main">受信待機中...</div><div class="sub">入力係が更新すると、メーターと履歴が自動更新されます。</div>`;
  borderHistoryArea.innerHTML=`<br><div class="result">共有履歴を受信中...</div>`;

  liveUnsubscribe=db.collection("family_meter").doc("live").onSnapshot(doc=>{
    if(!doc.exists){
      liveMeterBox.innerHTML=`<div class="rank">共有メーター</div><div class="main">まだ受信していません</div><div class="sub">入力係の更新待ちです。</div>`;
      return;
    }
    const d=doc.data();
    histZero.value=d.zero||"";
    histPlus1.value=d.plus1||"";
    histPlus2.value=d.plus2||"";
    if(d.rank)rank.value=d.rank;
    liveMeterBox.innerHTML=`<div class="rank">共有メーター ${d.rank||""}</div><div class="main">受信中</div><div class="live-values"><div class="live-value zero"><span>🟧 ±0</span><span>${yen(d.zero)}</span></div><div class="live-value plus1"><span>🟦 +1</span><span>${yen(d.plus1)}</span></div><div class="live-value plus2"><span>🟪 +2</span><span>${yen(d.plus2)}</span></div></div><div class="live-meta">更新者：${d.updater||"未入力"}<br>日付：${d.date||""}</div>`;
  },e=>{console.error(e);alert("受信に失敗しました。Firebaseルールを確認してください")});

  historyUnsubscribe=db.collection("shared_borders").orderBy("date","desc").limit(60).onSnapshot(snap=>{
    const list=[];
    snap.forEach(doc=>list.push(doc.data()));
    const cleanList=normalizeHistoryList(list);
    if(cleanList.length){
      saveBorderHistoryList(cleanList);
      renderSharedBorderHistory(cleanList);
    }else{
      borderHistoryArea.innerHTML=`<br><div class="result">共有履歴はまだありません。</div>`;
    }
  },e=>{
    console.error(e);
    borderHistoryArea.innerHTML=`<br><div class="result">共有履歴の受信に失敗しました。Firebaseルールを確認してください。</div>`;
  });
}

function stopLiveMeterSync(){
  if(liveUnsubscribe){liveUnsubscribe();liveUnsubscribe=null}
  if(historyUnsubscribe){historyUnsubscribe();historyUnsubscribe=null}
  liveMeterBox.innerHTML=`<div class="rank">共有メーター</div><div class="main">見るだけOFF</div><div class="sub">受信を停止しました。</div>`;
  renderBorderHistory();
}

function avg(l,k){let v=l.map(x=>x[k]).filter(v=>v>0);return v.reduce((a,b)=>a+b,0)/(v.length||1)}
function predictBorders(){let list=loadBorderHistory().filter(x=>x.rank===rank.value).slice(0,10);if(!list.length){borderAnalysis.innerHTML="履歴がありません。";return}predicted={zero:Math.round(avg(list,"zero")),plus1:Math.round(avg(list,"plus1")),plus2:Math.round(avg(list,"plus2"))};borderAnalysis.innerHTML=`<strong>直近${list.length}件平均</strong><br>±0：${yen(predicted.zero)}<br>+1：${yen(predicted.plus1)}<br>+2：${yen(predicted.plus2)}`}
function applyPredictedBorders(){if(!predicted)predictBorders();if(!predicted)return;zero.value=predicted.zero;plus1.value=predicted.plus1;plus2.value=predicted.plus2;showSection("calc");calc()}
function makeHistoryTable(list,label,isShared){
  let h=`<br><div class="shared-note">${label||""}</div><div class="history-scroll"><table><tr><th>日付</th><th>ランク</th><th>±0</th><th>+1</th><th>+2</th><th>更新者</th><th>削除</th></tr>`;
  list.forEach(x=>{
    const key=historyKey(x);
    h+=`<tr><td>${x.date}</td><td>${x.rank||""}</td><td>${yen(x.zero)}</td><td>${yen(x.plus1)}</td><td>${yen(x.plus2)}</td><td>${x.updater||""}</td><td><button class="delete-mini" onclick="${isShared?`deleteSharedHistory('${key}')`:`deleteLocalHistory('${key}')`}">削除</button></td></tr>`;
  });
  return h+"</table></div>";
}
function renderBorderHistory(){let list=normalizeHistoryList(loadBorderHistory());if(!list.length){borderHistoryArea.innerHTML=`<br><div class="result">履歴はまだありません。</div>`;return}borderHistoryArea.innerHTML=makeHistoryTable(list,"端末に保存されている履歴",false)}
function renderSharedBorderHistory(list){borderHistoryArea.innerHTML=makeHistoryTable(normalizeHistoryList(list),"みんなで共有中の履歴",true)}

function deleteLocalHistory(key){
  if(!confirm("この端末の履歴から削除しますか？"))return;
  let list=loadBorderHistory().filter(x=>historyKey(x)!==key);
  saveBorderHistoryList(list);
  renderBorderHistory();
}
function deleteLocalHistoryNoConfirm(key){
  let list=loadBorderHistory().filter(x=>historyKey(x)!==key);
  saveBorderHistoryList(list);
}
async function deleteSharedHistory(key){
  if(!confirm("共有履歴から削除しますか？みんなの画面からも消えます。"))return;
  if(!initFirebase()){alert("Firebaseに接続できません");return}
  try{
    await db.collection("shared_borders").doc(key).delete();
    await db.collection("family_meter").doc(key).delete();
    deleteLocalHistoryNoConfirm(key);
    renderBorderHistory();
    alert("共有履歴から削除しました");
  }catch(e){console.error(e);alert("削除に失敗しました。Firebaseルールを確認してください")}
}
function downloadBorderCSV(){let list=loadBorderHistory();if(!list.length){alert("履歴がありません");return}let csv=[["date","rank","zero","plus1","plus2","myPoint"],...list.map(x=>[x.date,x.rank||"",x.zero,x.plus1,x.plus2,x.myPoint||""])].map(r=>r.join(",")).join("\n");let blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});let url=URL.createObjectURL(blob);let a=document.createElement("a");a.href=url;a.download="pococha_border_history.csv";a.click();URL.revokeObjectURL(url)}
function saveInputs(){let ids=["point","yellBonusPoint","zero","plus1","plus2","rank","updaterName","base","coreCount","selectedItem"];let d={};ids.forEach(id=>{let el=document.getElementById(id);if(el)d[id]=el.value});localStorage.setItem("inputs",JSON.stringify(d))}
function loadInputs(){borderDate.value=todayISO();let s=localStorage.getItem("inputs");if(!s){applyRankPreset();return}let d=JSON.parse(s);Object.keys(d).forEach(id=>{let el=document.getElementById(id);if(el)el.value=d[id]})}

loadInputs();
renderItems();
renderCoreRules();
renderBorderHistory();
showCoreBonus();
</script>
</body>
</html>
