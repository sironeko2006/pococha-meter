<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ポコチャメーター シンプル版</title>
<style>
body{margin:0;background:#f5f5f5;font-family:sans-serif;padding-bottom:80px;color:#222}
header{background:white;padding:14px;border-bottom:1px solid #ddd}
h1{font-size:20px;margin:0}
main{padding:12px;max-width:520px;margin:auto}
.card{background:white;border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 2px 10px #0001}
label{font-weight:bold;display:block;margin-top:10px}
input,select{width:100%;height:48px;font-size:20px;border:1px solid #ddd;border-radius:12px;padding:0 10px;box-sizing:border-box}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
button{width:100%;padding:14px;border:0;border-radius:14px;background:#ff6b4a;color:white;font-size:17px;font-weight:bold;margin-top:10px}
button.blue{background:#2f80ed}
button.dark{background:#333}
.result{background:#fafafa;border:1px solid #eee;border-radius:14px;padding:12px;margin-top:10px;line-height:1.7}
.big{font-size:25px;font-weight:bold;color:#ff6b4a}
.nav{position:fixed;bottom:0;left:0;right:0;background:white;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px;border-top:1px solid #ddd}
.nav button{font-size:14px;margin:0}
.section{display:none}
.section.active{display:block}
table{width:100%;border-collapse:collapse;font-size:13px}
td,th{border-bottom:1px solid #eee;padding:6px;text-align:right}
td:first-child,th:first-child{text-align:left}
</style>
</head>
<body>

<header>
<h1>ポコチャメーター シンプル版</h1>
<small>ファミリー共有・履歴・平均・コア％・簡単計算</small>
</header>

<main>

<section id="share" class="section active">
<div class="card">
<h2>👪 共有メーター</h2>

<label>日付</label>
<input id="date" type="date">

<label>ランク</label>
<select id="rank">
<option>S1</option><option>S2</option><option>S3</option>
<option>S4</option><option>S5</option><option>S6</option>
</select>

<div id="display" class="result">
<div class="big">まだ受信していません</div>
</div>

<button class="blue" onclick="watchMeter()">見るだけ：受信ON</button>
</div>

<div class="card">
<h2>✍️ 入力係</h2>
<div class="grid3">
<div><label>±0</label><input id="zero" type="number"></div>
<div><label>+1</label><input id="plus1" type="number"></div>
<div><label>+2</label><input id="plus2" type="number"></div>
</div>
<button onclick="shareMeter()">ファミリーに共有</button>
</div>
</section>

<section id="history" class="section">
<div class="card">
<h2>📝 履歴</h2>
<button class="blue" onclick="loadHistory()">履歴を表示</button>
<div id="historyArea" class="result">まだ表示していません。</div>
</div>

<div class="card">
<h2>📊 直近10日平均</h2>
<button class="blue" onclick="loadAverage()">平均を見る</button>
<div id="averageArea" class="result">まだ表示していません。</div>
</div>
</section>

<section id="calc" class="section">
<div class="card">
<h2>⭐ コア人数％</h2>
<label>コア人数</label>
<input id="coreNow" type="number" value="0">
<label>目標コア人数</label>
<input id="coreGoal" type="number" value="50">
<button class="blue" onclick="calcCore()">コア％を見る</button>
<div id="coreArea" class="result">まだ計算していません。</div>
</div>

<div class="card">
<h2>⚡ 簡単計算</h2>
<label>現在pt</label>
<input id="point" type="number">
<label>1コインpt</label>
<input id="coinPt" type="number" value="4" step="0.1">
<button onclick="calculate()">計算する</button>
<div id="calcArea" class="result">まだ計算していません。</div>
</div>
</section>

</main>

<div class="nav">
<button onclick="show('share')">共有</button>
<button onclick="show('history')">履歴/平均</button>
<button onclick="show('calc')">計算</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyA2EXZvEI_xeFBNuz40HoN32l6RxGdE518",
authDomain:"pocochameter.firebaseapp.com",
projectId:"pocochameter",
storageBucket:"pocochameter.firebasestorage.app",
messagingSenderId:"698530879419",
appId:"1:698530879419:web:601abd54ddd0303510969e"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let unsubscribe=null;

function yen(n){return Math.round(Number(n||0)).toLocaleString();}
function yesterday(){
const d=new Date();
d.setDate(d.getDate()-1);
return d.toISOString().slice(0,10);
}
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}
function id(){
return document.getElementById("date").value+"_"+document.getElementById("rank").value;
}
function dataInput(){
return{
date:document.getElementById("date").value,
rank:document.getElementById("rank").value,
zero:Number(document.getElementById("zero").value),
plus1:Number(document.getElementById("plus1").value),
plus2:Number(document.getElementById("plus2").value),
createdAt:new Date().toISOString()
};
}
function render(d,msg){
if(!d){
document.getElementById("display").innerHTML=`<div class="big">まだ受信していません</div><small>${msg||""}</small>`;
return;
}
document.getElementById("display").innerHTML=`
<small>${d.date} / ${d.rank}</small>
<div class="big">±0 ${yen(d.zero)}<br>+1 ${yen(d.plus1)}<br>+2 ${yen(d.plus2)}</div>
<small>${msg||""}</small>`;
document.getElementById("zero").value=d.zero;
document.getElementById("plus1").value=d.plus1;
document.getElementById("plus2").value=d.plus2;
}

async function shareMeter(){
const d=dataInput();
if(!d.zero||!d.plus1||!d.plus2){alert("±0/+1/+2を入力してね");return;}
await db.collection("family_meter").doc(id()).set(d);
render(d,"共有できました！");
alert("共有できました！");
}

function watchMeter(){
if(unsubscribe)unsubscribe();
render(null,"受信待機中...");
unsubscribe=db.collection("family_meter").doc(id()).onSnapshot(doc=>{
if(!doc.exists){render(null,"まだ共有されていません。");return;}
render(doc.data(),"リアルタイム受信しました。");
});
}

async function loadHistory(){
const rank=document.getElementById("rank").value;
const area=document.getElementById("historyArea");
area.innerHTML="読み込み中...";
const snap=await db.collection("family_meter").where("rank","==",rank).get();
const rows=snap.docs.map(d=>d.data()).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
if(!rows.length){area.innerHTML="履歴がありません。";return;}
let html="<table><tr><th>日付</th><th>±0</th><th>+1</th><th>+2</th></tr>";
rows.forEach(x=>html+=`<tr><td>${x.date}</td><td>${yen(x.zero)}</td><td>${yen(x.plus1)}</td><td>${yen(x.plus2)}</td></tr>`);
html+="</table>";
area.innerHTML=html;
}

async function loadAverage(){
const rank=document.getElementById("rank").value;
const area=document.getElementById("averageArea");
area.innerHTML="読み込み中...";
const from=new Date();
from.setDate(from.getDate()-10);
const fromDate=from.toISOString().slice(0,10);
const snap=await db.collection("family_meter").where("rank","==",rank).where("date",">=",fromDate).get();
const rows=snap.docs.map(d=>d.data());
if(!rows.length){area.innerHTML="直近10日データがありません。";return;}
const avg=k=>Math.round(rows.reduce((a,b)=>a+Number(b[k]||0),0)/rows.length);
const z=avg("zero"),p1=avg("plus1"),p2=avg("plus2");
area.innerHTML=`<strong>${rank} 直近10日平均</strong><br>件数：${rows.length}件<br><br>±0：${yen(z)}<br>+1：${yen(p1)}<br>+2：${yen(p2)}<br><button class="dark" onclick="setMeter(${z},${p1},${p2})">計算に反映</button>`;
}

function setMeter(z,p1,p2){
document.getElementById("zero").value=z;
document.getElementById("plus1").value=p1;
document.getElementById("plus2").value=p2;
show("calc");
}

function calcCore(){
const now=Number(document.getElementById("coreNow").value||0);
const goal=Number(document.getElementById("coreGoal").value||1);
const pct=Math.min(999,Math.round(now/goal*100));
document.getElementById("coreArea").innerHTML=`コア人数：${now}人 / ${goal}人<br><div class="big">${pct}%</div>`;
}

function calculate(){
const point=Number(document.getElementById("point").value||0);
const coinPt=Number(document.getElementById("coinPt").value||4);
const z=Number(document.getElementById("zero").value||0);
const p1=Number(document.getElementById("plus1").value||0);
const p2=Number(document.getElementById("plus2").value||0);
if(!point||!z||!p1||!p2){document.getElementById("calcArea").innerHTML="現在ptとメーターを入力してね。";return;}
function line(name,target){
const need=Math.max(0,target-point);
const coin=Math.ceil(need/coinPt);
return `<strong>${name}まで</strong><br>あと ${yen(need)}pt<br>約 ${yen(coin)}コイン<br>花火：約 ${yen(Math.ceil(coin/1080))}個<br>馬車：約 ${yen(Math.ceil(coin/5555))}個<br><br>`;
}
document.getElementById("calcArea").innerHTML=`現在：${yen(point)}pt<br><br>${line("±0",z)}${line("+1",p1)}${line("+2",p2)}`;
}

document.getElementById("date").value=yesterday();
</script>
</body>
</html>
