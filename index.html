<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ポコチャメーター超シンプル版</title>
<style>
body{margin:0;background:#f5f5f5;font-family:sans-serif;color:#222}
header{background:white;padding:16px;border-bottom:1px solid #ddd}
h1{font-size:22px;margin:0;font-weight:900}
main{padding:14px;max-width:520px;margin:auto}
.card{background:white;border-radius:20px;padding:16px;margin:14px 0;box-shadow:0 2px 10px #0001}
label{display:block;font-weight:900;margin-top:12px}
input,select{width:100%;height:52px;border:1px solid #ddd;border-radius:14px;padding:0 12px;font-size:22px;font-weight:900;box-sizing:border-box}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
button{width:100%;border:0;border-radius:16px;background:#ff6b4a;color:white;font-size:20px;font-weight:900;padding:16px;margin-top:16px}
.result{background:#fafafa;border:1px solid #eee;border-radius:16px;padding:16px;margin-top:14px;line-height:1.8}
.big{font-size:32px;font-weight:900;color:#ff6b4a}
.bar{height:18px;background:#eee;border-radius:999px;overflow:hidden;margin:10px 0}
.fill{height:100%;background:#ff6b4a;width:0%}
.small{color:#666;font-size:13px;line-height:1.6}
</style>
</head>

<body>
<header>
<h1>ポコチャメーター</h1>
<div class="small">現在pt・コア人数・±0/+1/+2だけの超シンプル版</div>
</header>

<main>
<div class="card">
<h2>入力</h2>

<label>現在pt</label>
<input id="point" type="number" inputmode="numeric" placeholder="例：300000">

<label>コア人数</label>
<input id="core" type="number" inputmode="numeric" value="0">

<div class="grid3">
<div>
<label>±0</label>
<input id="zero" type="number" inputmode="numeric">
</div>
<div>
<label>+1</label>
<input id="plus1" type="number" inputmode="numeric">
</div>
<div>
<label>+2</label>
<input id="plus2" type="number" inputmode="numeric">
</div>
</div>

<button onclick="calc()">計算する</button>

<div id="result" class="result">
まだ計算していません。
</div>
</div>
</main>

<script>
function yen(n){
  return Math.round(Number(n||0)).toLocaleString();
}

function num(id){
  return Number(document.getElementById(id).value || 0);
}

function coreRate(core){
  if(core >= 500) return 1.22;
  if(core >= 400) return 1.21;
  if(core >= 300) return 1.20;
  if(core >= 250) return 1.19;
  if(core >= 200) return 1.18;
  if(core >= 150) return 1.17;
  if(core >= 100) return 1.16;
  if(core >= 90) return 1.15;
  if(core >= 80) return 1.14;
  if(core >= 70) return 1.13;
  if(core >= 60) return 1.12;
  if(core >= 50) return 1.11;
  if(core >= 45) return 1.10;
  if(core >= 40) return 1.09;
  if(core >= 35) return 1.08;
  if(core >= 30) return 1.07;
  if(core >= 25) return 1.06;
  if(core >= 20) return 1.05;
  if(core >= 15) return 1.04;
  if(core >= 10) return 1.03;
  if(core >= 5) return 1.02;
  if(core >= 2) return 1.01;
  return 1.00;
}

function targetName(point,z,p1,p2){
  if(point >= p2) return "+2圏内";
  if(point >= p1) return "+1圏内";
  if(point >= z) return "±0圏内";
  return "±0未満";
}

function percent(point,target){
  if(target <= 0) return 0;
  return Math.max(0, Math.min(100, Math.round(point / target * 100)));
}

function needLine(name, point, target, ptPerCoin){
  const needPt = Math.max(0, target - point);
  const needCoin = Math.ceil(needPt / ptPerCoin);
  return `
    <strong>${name}まで</strong><br>
    必要pt：${yen(needPt)}pt<br>
    必要エール数：約 <strong>${yen(needCoin)}</strong><br>
    メーター：${percent(point,target)}%
    <div class="bar"><div class="fill" style="width:${percent(point,target)}%"></div></div>
  `;
}

function calc(){
  const point = num("point");
  const core = num("core");
  const z = num("zero");
  const p1 = num("plus1");
  const p2 = num("plus2");

  if(point <= 0 || z <= 0 || p1 <= 0 || p2 <= 0){
    document.getElementById("result").innerHTML = "現在pt と ±0 / +1 / +2 を入力してください。";
    return;
  }

  const rate = coreRate(core);
  const ptPerCoin = 4 * rate;

  document.getElementById("result").innerHTML = `
    <div class="big">${targetName(point,z,p1,p2)}</div>
    コア人数：${core}人<br>
    コアボーナス：${Math.round(rate * 100)}%<br>
    1エール：約 ${ptPerCoin.toFixed(2)}pt<br><br>

    ${needLine("±0", point, z, ptPerCoin)}
    ${needLine("+1", point, p1, ptPerCoin)}
    ${needLine("+2", point, p2, ptPerCoin)}
  `;
}
</script>
</body>
</html>
